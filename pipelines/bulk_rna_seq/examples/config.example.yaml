project_name: example_bulk_rna_seq_project
genome: hg38

paths:
  raw_fastq_dir: /path/to/raw_fastq
  output_dir: /path/to/output
  salmon_index: /path/to/salmon_index
  gtf_file: /path/to/annotation.gtf

parameters:
  threads: 8
  paired_end: true
  quantification_method: salmon
  differential_expression_method: DESeq2
